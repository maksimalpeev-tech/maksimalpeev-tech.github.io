<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лабораторная 5.1 — Горизонтальное меню</title>
<style>
    .menu {
        list-style: none;
        margin: 0;
        padding: 10px;
        overflow: hidden; 
    }

    .menu li {
        float: left; 
        margin-right: 15px; 
    }

    .menu li a {
        display: block;
        padding: 10px 10px; 
        background: #ccf;   
        color: #0000FF;     
        
        text-decoration: underline; 
        cursor: pointer;            
    }

    .menu li a:hover {
        background: #aab; 
        color: #000055;   
        text-decoration: none; 
    }
</style>
</head>
<body>

<ul class="menu">
    <li><a href="#">Пункт 1</a></li>
    <li><a href="#">Пункт 2</a></li>
    <li><a href="#">Пункт 3</a></li>
    <li><a href="#">Пункт 4</a></li>
    <li><a href="#">Пункт 5</a></li>
</ul>

</body>
</html>
