<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная 2.2 — Таблицы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .tables-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }
        table {
            border-collapse: collapse;
            width: 250px;
            margin: 20px 0;
        }
        td, th {
            border: 1px solid gray;
            padding: 30px;
            text-align: center;
        }
        caption {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Лабораторная 2.2 — Таблицы</h1>

    <div class="tables-container">
        
        <!-- Таблица 1 -->
        <div>
            <caption>1-я таблица</caption>
            <table>
                <tr>
                    <th rowspan="2">1</th>
                    <td colspan="2">2</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>6</td>
                </tr>
            </table>
        </div>

        <!-- Таблица 2 -->
        <div>
            <caption>2-я таблица</caption>
            <table>
                <tr>
                    <th colspan="2">1</th>
                </tr>
                <tr>
                    <td rowspan="2">3</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td>6</td>
                </tr>
            </table>
        </div>

        <!-- Таблица 3 -->
        <div>
            <caption>3-я таблица</caption>
            <table>
                <tr>
                    <td>1</td>
                    <td rowspan="3">2</td>
                </tr>
                <tr>
                    <td>3</td>
                </tr>
                <tr>
                    <td>5</td>
                </tr>
            </table>
        </div>

        <!-- Таблица 4 -->
        <div>
            <caption>4-я таблица</caption>
            <table>
                <tr>
                    <th colspan="2">1</th>
                </tr>
                <tr>
                    <td>3</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td colspan="2">5</td>
                </tr>
            </table>
        </div>

    </div>

    <hr>

</body>
</html>
