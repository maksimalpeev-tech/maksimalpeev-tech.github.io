<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная 2.5 — Форма регистрации</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .form-row {
            margin: 15px 0;
            display: flex;
            align-items: flex-start;
        }
        .form-row label:first-child {
            width: 150px;
            font-weight: bold;
            padding-top: 8px;
        }
        .form-row input[type="email"],
        .form-row input[type="password"],
        .form-row select,
        .form-row textarea {
            flex: 1;
            padding: 8px;
            font-size: 14px;
        }
        .form-row textarea {
            height: 100px;
            resize: vertical;
        }
        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .checkbox-group label,
        .radio-group label {
            font-weight: normal;
            cursor: pointer;
        }
        .buttons {
            margin-top: 20px;
        }
        .buttons button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Форма регистрации пользователя</h1>

    <form action="#" method="post">
        
        <!-- E-mail -->
        <div class="form-row">
            <label for="email">E-mail</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   placeholder="Введите e-mail" 
                   required>
        </div>

        <!-- Пароль -->
        <div class="form-row">
            <label for="password">Пароль</label>
            <input type="password" 
                   id="password" 
                   name="password" 
                   placeholder="Введите пароль" 
                   required>
        </div>

        <!-- Пол -->
        <div class="form-row">
            <label>Пол</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="gender" value="male" checked> 
                    Мужчина
                </label>
                <label>
                    <input type="radio" name="gender" value="female"> 
                    Женщина
                </label>
            </div>
        </div>

        <!-- Год рождения -->
        <div class="form-row">
            <label for="year">Год рождения</label>
            <div>
                <select id="year" name="year">
                    <option value="1981" selected>1981</option>
                    <option value="1982">1982</option>
                    <option value="1983">1983</option>
                    <option value="1984">1984</option>
                    <option value="1985">1985</option>
                    <option value="1986">1986</option>
                    <option value="1987">1987</option>
                    <option value="1988">1988</option>
                    <option value="1989">1989</option>
                    <option value="1990">1990</option>
                    <option value="1991">1991</option>
                    <option value="1992">1992</option>
                    <option value="1993">1993</option>
                    <option value="1994">1994</option>
                    <option value="1995">1995</option>
                    <option value="1996">1996</option>
                    <option value="1997">1997</option>
                    <option value="1998">1998</option>
                    <option value="1999">1999</option>
                    <option value="2000">2000</option>
                </select>
                <span>-й</span>
            </div>
        </div>

        <!-- Языки -->
        <div class="form-row">
            <label>Я знаю</label>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="lang" value="russian" checked disabled> 
                    Русский
                </label>
                <label>
                    <input type="checkbox" name="lang" value="spanish"> 
                    Испанский
                </label>
                <label>
                    <input type="checkbox" name="lang" value="german"> 
                    Немецкий
                </label>
                <label>
                    <input type="checkbox" name="lang" value="english"> 
                    Английский
                </label>
                <label>
                    <input type="checkbox" name="lang" value="chinese"> 
                    Китайский
                </label>
            </div>
        </div>

        <!-- Обо мне -->
        <div class="form-row">
            <label for="about">Обо мне</label>
            <textarea id="about" 
                      name="about" 
                      placeholder="Напишите коротко о себе"></textarea>
        </div>

        <!-- Кнопки -->
        <div class="buttons">
            <button type="submit">Готово</button>
            <button type="reset">Очистить</button>
        </div>

    </form>

    <hr>
    <p><a href="lab2_4.html">← Предыдущее</a> | <a href="../index.html">🏠 На главную</a></p>

</body>
</html>
