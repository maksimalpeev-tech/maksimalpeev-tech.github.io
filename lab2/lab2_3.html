<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная 2.3 — Фреймы</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            padding: 20px;
            margin: 0;
            background: #f0f0f0;
        }
        .frames-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .left-frame {
            width: 200px;
            border-right: 1px solid #ccc;
            flex-shrink: 0;
        }
        .right-frame {
            flex: 1;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Лабораторная 2.3 — Фреймы</h1>

    <div class="frames-container">
        <!-- Левый фрейм (меню) -->
        <div class="left-frame">
            <iframe src="menu.html" name="menu"></iframe>
        </div>
        
        <!-- Правый фрейм (контент) -->
        <div class="right-frame">
            <iframe src="content.html" name="content"></iframe>
        </div>
    </div>

</body>
</html>
